<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Royal Spice Restaurant</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #f8f8f8;
}

/* Navbar */
nav {
  display: flex;
  justify-content: space-between;
  padding: 15px 50px;
  background: black;
  color: white;
  position: sticky;
  top: 0;
}

nav a {
  color: white;
  margin: 0 10px;
  text-decoration: none;
}

/* Hero */
.hero {
  height: 90vh;
  background: url('https://images.unsplash.com/photo-1555396273-367ea4eb4db5') center/cover;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  color: white;
}

.hero h1 {
  font-size: 50px;
}

.btn {
  background: orange;
  padding: 12px 25px;
  border-radius: 5px;
  color: white;
  text-decoration: none;
}

/* Section */
.section {
  padding: 60px 20px;
  text-align: center;
}

/* Menu */
.menu {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
  padding: 20px;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 10px;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-5px);
}

/* Gallery */
.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
}

.gallery img {
  width: 100%;
  height: 200px;
  object-fit: cover;
}

/* Contact */
.contact {
  background: #111;
  color: white;
  padding: 50px;
}

/* Footer */
footer {
  background: black;
  color: white;
  text-align: center;
  padding: 15px;
}

/* WhatsApp Button */
.whatsapp {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: green;
  color: white;
  padding: 15px;
  border-radius: 50%;
  text-decoration: none;
  font-size: 20px;
}
</style>
</head>

<body>

<nav>
  <h2>Royal Spice</h2>
  <div>
    <a href="#">Home</a>
    <a href="#menu">Menu</a>
    <a href="#gallery">Gallery</a>
    <a href="#contact">Contact</a>
  </div>
</nav>

<div class="hero">
  <h1>Experience Fine Dining</h1>
  <a href="#menu" class="btn">View Menu</a>
</div>

<div class="section" id="menu">
  <h2>Our Special Menu</h2>
  <div class="menu">
    <div class="card">
      <h3>Paneer Butter Masala</h3>
      <p>₹250</p>
    </div>
    <div class="card">
      <h3>Chicken Biryani</h3>
      <p>₹300</p>
    </div>
    <div class="card">
      <h3>Tandoori Chicken</h3>
      <p>₹350</p>
    </div>
  </div>
</div>

<div class="section" id="gallery">
  <h2>Gallery</h2>
  <div class="gallery">
    <img src="https://images.unsplash.com/photo-1600891964599-f61ba0e24092">
    <img src="https://images.unsplash.com/photo-1555396273-367ea4eb4db5">
    <img src="https://images.unsplash.com/photo-1546069901-ba9599a7e63c">
  </div>
</div>

<div class="contact" id="contact">
  <h2>Contact Us</h2>
  <p>📍 Bangalore, India</p>
  <p>📞 9876543210</p>
  <p>📧 royalspice@email.com</p>
</div>

<footer>
  © 2026 Royal Spice Restaurant
</footer>

<!-- WhatsApp Button -->
<a class="whatsapp" href="https://wa.me/919876543210">💬</a>

</body>
</html>
